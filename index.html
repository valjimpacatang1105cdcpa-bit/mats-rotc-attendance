<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MATS ROTC UNIT ATTENDANCE</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;
}

header{
    background:#0B57D0;
    color:white;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

#reader{
    width:340px;
    margin:30px auto;
}

#result{
    width:340px;
    margin:auto;
    padding:15px;
    border-radius:10px;
    display:none;
    font-size:20px;
    font-weight:bold;
}

.success{
    background:#d4edda;
    color:#155724;
}

.error{
    background:#f8d7da;
    color:#721c24;
}

button{
    padding:12px 25px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
🎖️ MATS ROTC UNIT ATTENDANCE
</header>

<div id="reader"></div>

<div id="result"></div>

<script>

function show(msg,type){

    const r=document.getElementById("result");

    r.className=type;
    r.style.display="block";
    r.innerHTML=msg;

}

const scanner=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cameras=>{

    if(cameras.length){

        scanner.start(

            cameras[0].id,

            {
                fps:10,
                qrbox:250
            },

            qrCodeMessage=>{

                scanner.stop();

                show(
                    "QR Detected:<br><br>"+qrCodeMessage,
                    "success"
                );

            }

        );

    }else{

        show("No Camera Found","error");

    }

}).catch(err=>{

    show(err,"error");

});

</script>

</body>
</html>
