<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<header>

<div style="font-size:40px;">
🎖️ MATS ROTC UNIT ATTENDANCE
</div>

<div id="today"
style="
margin-top:10px;
font-size:18px;
font-weight:normal;">
</div>

<div id="clock"
style="
font-size:30px;
margin-top:8px;
font-weight:bold;">
</div>

</header>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0b57d0,#1565c0);
text-align:center;
padding:30px;
min-height:100vh;
}

header{
background:white;
color:#0d47a1;
padding:25px;
font-size:34px;
font-weight:bold;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.25);
margin-bottom:25px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.30);
}

h2{
margin-bottom:15px;
}

#reader{
width:100%;
max-width:500px;
margin:20px auto;
padding:15px;
background:#fafafa;
border-radius:15px;
border:3px solid #1976d2;
}

button{

padding:14px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin:10px;

}

#startBtn{

background:#1976d2;
color:white;

}

#stopBtn{

background:#d32f2f;
color:white;

}

#result{
margin-top:25px;
font-size:24px;
font-weight:bold;
padding:15px;
border-radius:12px;
background:#f5f5f5;
min-height:60px;
display:flex;
justify-content:center;
align-items:center;
}

.success{

color:green;

}

.error{

color:red;

}

.student{
margin-top:20px;
font-size:30px;
font-weight:bold;
color:#0d47a1;
}

.time{
font-size:20px;
margin-top:10px;
color:#555;
}
footer{

margin-top:40px;
padding:15px;
background:#0d47a1;
color:white;

}

</style>

</head>

<body>


<div class="container">

<h2>QR Attendance Scanner</h2>

<div id="reader"></div>

<button id="startBtn">

Start Scanner

</button>

<button id="stopBtn">

Stop Scanner

</button>

<div id="result"></div>

<div class="student" id="student"></div>

<div class="time" id="time"></div>

</div>

<footer>

MATS QR Attendance System

</footer>
<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyjs55YWgb6owkyYckGoA_PlWS9VT0EdKvhjm8wEgZBcwCmfW_dsk4PwngTeurlFwBWVw/exec";

let scanner;

function startScanner(){

scanner = new Html5Qrcode("reader");

scanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:250
},

onScanSuccess

);

}

function stopScanner(){

if(scanner){

scanner.stop();

}

}
    async function onScanSuccess(decodedText){

stopScanner();

document.getElementById("result").innerHTML="⏳ Checking attendance...";
document.getElementById("student").innerHTML="";
document.getElementById("time").innerHTML="";

try{

const response = await fetch(API_URL + "?qr=" + encodeURIComponent(decodedText));

const data = await response.json();

if(data.success){

document.getElementById("result").innerHTML="<span class='success'>✅ Attendance Recorded</span>";

document.getElementById("student").innerHTML=data.student;

document.getElementById("time").innerHTML="Time In: "+data.time;

}else{

document.getElementById("result").innerHTML="<span class='error'>❌ "+data.message+"</span>";

}

}catch(err){

document.getElementById("result").innerHTML="<span class='error'>Connection Error</span>";

}

setTimeout(function(){

startScanner();

},3000);

}
    // ===== LIVE DATE & CLOCK =====

function updateClock() {

  const now = new Date();

  document.getElementById("today").innerHTML =
    now.toLocaleDateString("en-US", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric"
    });

  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("en-US");

}

setInterval(updateClock, 1000);

updateClock();

// =============================
    document.getElementById("startBtn").addEventListener("click",function(){

startScanner();

});

document.getElementById("stopBtn").addEventListener("click",function(){

stopScanner();

});

</script>

</body>
</html>
