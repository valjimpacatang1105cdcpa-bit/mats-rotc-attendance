<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0b57d0,#1565c0);
text-align:center;
padding:30px;
min-height:100vh;
}

header{
background:white;
color:#0d47a1;
padding:25px;
font-size:34px;
font-weight:bold;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.25);
margin-bottom:25px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.30);
}

h2{
margin-bottom:15px;
}

#reader{
width:100%;
max-width:500px;
margin:20px auto;
padding:15px;
background:#fafafa;
border-radius:15px;
border:3px solid #1976d2;
}

button{

padding:14px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin:10px;

}

#startBtn{

background:#1976d2;
color:white;

}

#stopBtn{

background:#d32f2f;
color:white;

}

.status{

margin-top:25px;
padding:18px;
border-radius:12px;
font-size:24px;
font-weight:bold;
transition:.3s;

}

.ready{

background:#e8f5e9;
color:#2e7d32;
border:2px solid #4caf50;

}

.scanning{

background:#fff8e1;
color:#f57c00;
border:2px solid #ff9800;

}

.success{

background:#e3f2fd;
color:#1565c0;
border:2px solid #2196f3;

}

.error{

background:#ffebee;
color:#c62828;
border:2px solid #f44336;

}

.student{
margin-top:20px;
font-size:30px;
font-weight:bold;
color:#0d47a1;
}

.time{
font-size:20px;
margin-top:10px;
color:#555;
}
footer{

margin-top:40px;
padding:15px;
background:#0d47a1;
color:white;

}

</style>

</head>

<body>


<div class="container">

<h2>📷 Scan Student QR Code</h2>
<p>Please place the QR Code inside the camera frame.</p>
<div id="reader"></div>
    

<button id="stopBtn">

⏹ Stop Scanner

</button>

<div id="status" class="status ready">

🟢 READY TO SCAN

</div>

<div class="student" id="student"></div>

<div class="time" id="time"></div>

</div>

<footer>

MATS QR Attendance System

</footer>
<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyjs55YWgb6owkyYckGoA_PlWS9VT0EdKvhjm8wEgZBcwCmfW_dsk4PwngTeurlFwBWVw/exec";

let scanner;

// ===== SOUND EFFECTS =====

function playSuccessBeep() {

    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.play();

}

function playDuplicateBeep() {

    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();

}

function playErrorBeep() {

    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    audio.play();

}

// ==========================

{
facingMode:"environment"
},function startScanner(){

if (scanner) {
    return;
}

scanner = new Html5Qrcode("reader");

scanner.start(

{
fps:10,
qrbox:250
},

onScanSuccess

);

}

function stopScanner(){

if(scanner){

scanner.stop().then(function(){

scanner = null;

});

}

}
    async function onScanSuccess(decodedText){

const status = document.getElementById("status");

status.className = "status scanning";
status.innerHTML = "🟡 SCANNING...";

stopScanner();

status.className = "status scanning";
status.innerHTML = "🟡 CHECKING ATTENDANCE...";
document.getElementById("student").innerHTML="";
document.getElementById("time").innerHTML="";

try{

const response = await fetch(API_URL + "?qr=" + encodeURIComponent(decodedText));

const data = await response.json();

if (data.success) {

    status.className = "status success";
    status.innerHTML = "✅ ATTENDANCE RECORDED";

    playSuccessBeep();

    document.getElementById("student").innerHTML = "👤 " + data.student;

    document.getElementById("time").innerHTML =
        "🕒 Time In: " + data.time;

} else if (data.alreadyRecorded) {

    status.className = "status error";
    status.innerHTML = "⚠️ ATTENDANCE ALREADY RECORDED";

    playDuplicateBeep();

    document.getElementById("student").innerHTML = "👤 " + data.student;

    document.getElementById("time").innerHTML =
        "🕒 First Scan: " + data.time;

} else {

    status.className = "status error";
    status.innerHTML = "❌ " + data.message;

    playErrorBeep();

    document.getElementById("student").innerHTML = "";

    document.getElementById("time").innerHTML = "";

}

}catch(err){

status.className = "status error";
status.innerHTML = "❌ CONNECTION ERROR";

playErrorBeep();
}

setTimeout(function(){

status.className = "status ready";
status.innerHTML = "🟢 READY TO SCAN";

startScanner();

},3000);
}
    // ===== LIVE DATE & CLOCK =====

function updateClock() {

  const now = new Date();

  document.getElementById("today").innerHTML =
    now.toLocaleDateString("en-US", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric"
    });

  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("en-US");

}

setInterval(updateClock, 1000);

updateClock();

// =============================

    // Auto start scanner when page loads
window.onload = function () {
    startScanner();
};

    // Restart scanner after stopping
document.getElementById("stopBtn").addEventListener("click", function () {

    stopScanner();

    const status = document.getElementById("status");

    status.className = "status error";
    status.innerHTML = "⏹ SCANNER STOPPED";

});

document.getElementById("stopBtn").addEventListener("click",function(){

stopScanner();

});

</script>

</body>
</html>
