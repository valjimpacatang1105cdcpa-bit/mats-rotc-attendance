<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phone QR Test</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
margin:0;
padding:20px;
background:white;
text-align:center;
font-family:Arial;
}

#reader{
width:350px;
margin:auto;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:green;
white-space:pre-wrap;
}

</style>

</head>

<body>

<h2>Phone QR Test</h2>

<div id="reader"></div>

<div id="result">
Waiting...
</div>

<script>

//==============================
// ILAGAY DITO ANG WEB APP URL
//==============================

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyjs55YWgb6owkyYckGoA_PlWS9VT0EdKvhjm8wEgZBcwCmfW_dsk4PwngTeurlFwBWVw/exec";

//==============================

async function sendAttendance(qr){

    const response = await fetch(
        WEB_APP_URL + "?qr=" + encodeURIComponent(qr)
    );

    return await response.json();

}

const scanner = new Html5Qrcode("reader");

scanner.start(

{
    facingMode:"environment"
},

{
    fps:10,
    qrbox:250
},

async function(decodedText){

    scanner.pause(true);

    document.getElementById("result").innerHTML =
    "Sending...";

    try{

        const data = await sendAttendance(decodedText);

        document.getElementById("result").innerHTML =
        JSON.stringify(data,null,2);

    }

    catch(err){

        document.getElementById("result").innerHTML =
        "ERROR:\n" + err;

    }

}

);

</script>

</body>
</html>
